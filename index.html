<!DOCTYPE html>
<html>
<head>
  <title>squid game r&g</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#f7f7f5;
      --ink:#111827;
      --muted:#6b7280;
      --green:#22c55e;
      --red:#ef4444;
      --arena:#05070b;
      --panel:#0b1020;
      --ui-safe: 110px;
    }
    html,body{height:100%; margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); overflow:hidden;}
    *{box-sizing:border-box}
    .hidden{display:none !important;}
    .fade-in{animation:fadeIn .5s ease forwards;}
    .fade-out{animation:fadeOut .5s ease forwards;}
    .zoom-out{animation:zoomOut 1s ease forwards;}
    .shake{animation:shake .28s linear infinite;}
    .pulseGlow{animation:pulseGlow 1.1s ease-in-out infinite;}
    .floaty{animation:floaty 2.8s ease-in-out infinite;}
    .countdownPop{animation:pop .35s ease;}
    .cardHover{transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;}
    .cardHover:hover{transform:translateY(-4px) scale(1.02); box-shadow:0 18px 45px rgba(0,0,0,.12); filter:brightness(1.02);}
    .btnHover{transition:transform .2s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;}
    .btnHover:active{transform:scale(.97);}
    .spotlight{
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,.09), rgba(255,255,255,0) 24%),
        radial-gradient(circle at 50% 72%, rgba(255,255,255,.05), rgba(255,255,255,0) 38%),
        linear-gradient(to bottom, rgba(255,255,255,.03), rgba(0,0,0,.55));
    }
    .glow-green{text-shadow:0 0 12px rgba(34,197,94,.7), 0 0 30px rgba(34,197,94,.4);}
    .glow-red{text-shadow:0 0 12px rgba(239,68,68,.8), 0 0 30px rgba(239,68,68,.45);}
    .player{
      position:absolute; width:34px; height:52px; transform:translateX(-50%);
      transition: left .12s linear, opacity .45s ease, transform .25s ease;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.5));
      will-change:left, transform;
    }
    .player .head{width:18px;height:18px;border-radius:999px;background:#f8c9a0;margin:0 auto 2px auto;border:2px solid rgba(255,255,255,.08);}
    .player .body{width:26px;height:24px;border-radius:10px;background:linear-gradient(180deg,#f3f4f6,#cbd5e1);margin:0 auto;position:relative;overflow:hidden}
    .player .legs{width:28px;height:16px;position:relative;margin:0 auto}
    .player .legs::before,.player .legs::after{content:""; position:absolute; top:0; width:7px; height:16px; background:#94a3b8; border-radius:0 0 8px 8px;}
    .player .legs::before{left:4px; transform:skewX(-8deg);}
    .player .legs::after{right:4px; transform:skewX(8deg);}
    .player.running .body{animation:runBob .32s linear infinite;}
    .player.running .legs::before{animation:leg1 .32s linear infinite;}
    .player.running .legs::after{animation:leg2 .32s linear infinite;}
    .player.eliminated{opacity:.18; transform:translateX(-50%) scale(.9) rotate(-6deg);}
    .player.eliminated .body{background:#9ca3af}
    .track-line{position:absolute; left:0; right:0; height:2px; background:linear-gradient(to right, transparent, rgba(255,255,255,.25), transparent);}
    .progress-fill{transition:width .18s linear;}

    .doll{
      position:absolute; right:6%; top:10%; width:112px; height:156px; transform-origin:center center;
      filter:drop-shadow(0 18px 22px rgba(0,0,0,.55));
      transition: transform .42s ease, filter .42s ease;
      perspective: 800px;
    }
    .doll .doll-inner{
      position:relative; width:100%; height:100%;
      transform-style:preserve-3d;
      transition: transform .52s cubic-bezier(.2,.8,.2,1);
    }
    .doll.greenFacing .doll-inner{transform:rotateY(180deg);}
    .doll.redFacing .doll-inner{transform:rotateY(0deg);}
    .doll .face-side,.doll .back-side{
      position:absolute; inset:0; backface-visibility:hidden;
      display:flex; align-items:flex-start; justify-content:center;
    }
    .doll .back-side{transform:rotateY(180deg);}
    .doll .head{
      width:56px; height:56px; border-radius:999px; margin:0 auto;
      position:relative; overflow:hidden;
    }
    .doll .head::before{
      content:""; position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,.28), rgba(255,255,255,0) 18%),
        linear-gradient(180deg,#f5ccab 0%, #efb88c 55%, #dda473 100%);
      border:3px solid rgba(255,255,255,.08);
      border-radius:999px;
    }
    .doll .hair{
      position:absolute; inset:0; border-radius:999px;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.12), rgba(255,255,255,0) 18%),
        linear-gradient(180deg,#f59aa8 0%, #fb7185 100%);
      clip-path: polygon(8% 12%, 16% 2%, 34% 0%, 50% 8%, 66% 0%, 84% 2%, 92% 12%, 96% 28%, 94% 44%, 84% 54%, 76% 46%, 68% 56%, 50% 48%, 32% 56%, 24% 46%, 16% 54%, 6% 44%, 4% 28%);
      opacity:.95;
    }
    .doll .eyes{
      position:absolute; top:23px; left:50%; width:28px; height:8px; transform:translateX(-50%);
      border-radius:999px; background:#111827;
      box-shadow:-10px 0 0 0 #111827, 10px 0 0 0 #111827;
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.08));
    }
    .doll .mouth{
      position:absolute; top:33px; left:50%; width:12px; height:6px; transform:translateX(-50%);
      border-bottom:2px solid rgba(17,24,39,.72); border-radius:0 0 10px 10px;
    }
    .doll .body{
      width:70px; height:78px; margin:0 auto; margin-top:8px; border-radius:20px 20px 18px 18px;
      position:relative; overflow:hidden;
      box-shadow: inset 0 10px 18px rgba(255,255,255,.06);
    }
    .doll .body::before{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg,#fda4af 0%,#fb7185 52%,#e11d48 100%);
    }
    .doll .body::after{
      content:""; position:absolute; left:50%; top:10px; width:14px; height:44px; transform:translateX(-50%);
      background:rgba(255,255,255,.18); border-radius:999px; filter:blur(1px);
    }
    .doll .arm{
      position:absolute; top:68px; width:16px; height:54px; border-radius:999px;
      background:linear-gradient(180deg,#efc09f,#d79d73);
      box-shadow: inset 0 10px 10px rgba(255,255,255,.05);
    }
    .doll .arm.left{left:14px; transform:rotate(18deg);}
    .doll .arm.right{right:14px; transform:rotate(-18deg);}
    .doll .leg{
      position:absolute; top:128px; width:18px; height:28px; border-radius:0 0 12px 12px;
      background:linear-gradient(180deg,#9ca3af,#6b7280);
    }
    .doll .leg.left{left:38px;}
    .doll .leg.right{right:38px;}
    .doll .back-head{
      width:56px; height:56px; border-radius:999px; margin:0 auto; position:relative;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.08), rgba(255,255,255,0) 20%),
        linear-gradient(180deg,#4b5563 0%, #232933 100%);
      border:3px solid rgba(255,255,255,.06);
      overflow:hidden;
    }
    .doll .back-head::before{
      content:""; position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), rgba(255,255,255,0) 22%),
        linear-gradient(180deg,#111827 0%, #374151 100%);
      clip-path: polygon(18% 20%, 32% 10%, 50% 8%, 68% 10%, 82% 20%, 90% 38%, 86% 62%, 70% 82%, 50% 92%, 30% 82%, 14% 62%, 10% 38%);
      opacity:.95;
    }
    .doll .back-head::after{
      content:""; position:absolute; left:50%; top:12px; width:18px; height:28px; transform:translateX(-50%);
      background:linear-gradient(180deg,#f59e0b 0%, #92400e 100%);
      clip-path: polygon(10% 0%, 90% 0%, 100% 16%, 84% 100%, 16% 100%, 0% 16%);
      opacity:.9;
    }
    .doll .back-body{
      width:70px; height:78px; margin:0 auto; margin-top:8px; border-radius:20px 20px 18px 18px;
      background:linear-gradient(180deg,#374151 0%, #111827 100%);
      position:relative; overflow:hidden; box-shadow: inset 0 10px 18px rgba(255,255,255,.03);
    }
    .doll .back-body::before{
      content:""; position:absolute; inset:0;
      background:linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,0) 30%, rgba(0,0,0,.2) 80%);
    }
    .doll .back-body::after{
      content:""; position:absolute; inset:auto 18px 0 18px; height:18px;
      background:linear-gradient(180deg,#1f2937, #0f172a);
      border-radius:14px 14px 0 0;
    }
    .doll.turn{animation:dollTurn .48s ease;}
    .doll.greenFacing{filter:drop-shadow(0 18px 24px rgba(0,0,0,.45)) brightness(1.08);}
    .doll.redFacing{filter:drop-shadow(0 18px 24px rgba(0,0,0,.62)) brightness(.84) saturate(.9);}
    .screen-overlay{
      position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(circle at 50% 55%, rgba(255,255,255,.08), rgba(0,0,0,0) 30%),
                  radial-gradient(circle at 50% 50%, rgba(255,255,255,.02), rgba(0,0,0,.65) 72%);
    }
    .arena-bg{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.05), rgba(0,0,0,0) 26%),
        linear-gradient(180deg, #10131a 0%, #06080d 42%, #030407 100%);
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}
    @keyframes zoomOut{from{transform:scale(1)}to{transform:scale(.93)}}
    @keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-1px)}}
    @keyframes pulseGlow{0%,100%{transform:scale(1); filter:drop-shadow(0 0 0 rgba(255,255,255,0))}50%{transform:scale(1.03); filter:drop-shadow(0 0 18px rgba(255,255,255,.12))}}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes pop{0%{transform:scale(.8); opacity:.4}100%{transform:scale(1); opacity:1}}
    @keyframes runBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    @keyframes leg1{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-10deg)}}
    @keyframes leg2{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(10deg)}}
    @keyframes dollTurn{0%{transform:rotateY(0)}50%{transform:rotateY(98deg)}100%{transform:rotateY(180deg)}}
    .particle{position:absolute; width:8px; height:8px; border-radius:999px; pointer-events:none; opacity:.9}
    @media (max-width:640px){
      .doll{right:2%; top:9%; transform:scale(.78)}
      .player{width:28px;height:44px}
      .player .head{width:14px;height:14px}
      .player .body{width:21px;height:20px}
      .player .legs{width:22px;height:14px}
      :root{--ui-safe: 122px;}
    }
  </style>
</head>
<body>
  <div id="app" class="relative w-full h-full overflow-hidden">
    <section id="landing" class="absolute inset-0 flex items-center justify-center bg-white">
      <div class="text-center px-6">
        <div class="mb-3 text-xs tracking-[0.35em] uppercase text-gray-400">I invite you to play </div>
        <button id="invitationCard" class="cardHover mx-auto w-[min(92vw,430px)] rounded-3xl border border-gray-200 bg-white shadow-[0_10px_40px_rgba(0,0,0,.08)] p-8 sm:p-10 text-left">
          <div class="flex items-center justify-between">
            <div>
              <div class="inline-flex items-center gap-2 rounded-full bg-gray-100 px-3 py-1 text-[11px] font-semibold tracking-[0.2em] text-gray-500 uppercase">invitation card</div>
              <h1 class="mt-5 text-3xl sm:text-4xl font-semibold tracking-tight text-gray-900">Red Light, Green Light! :)</h1>
              <p class="mt-3 text-sm sm:text-base text-gray-500 leading-6">Click to enter a red-light, green-light arena. Simple, cinematic, and fully playable in your browser.</p>
            </div>
            <div class="hidden sm:block w-16 h-16 rounded-2xl bg-gradient-to-br from-rose-500 to-red-600 shadow-lg shadow-red-500/25"></div>
          </div>
          <div class="mt-8 flex items-center justify-between">
            <div class="text-xs text-gray-400">By Tayyaba</div>
            <div class="text-sm font-medium text-gray-900">Whatchu waitin' for? let's go →</div>
          </div>
        </button>
      </div>
    </section>

    <section id="game" class="absolute inset-0 hidden arena-bg text-white">
      <div id="arenaShake" class="relative w-full h-full">
        <div class="absolute inset-0 spotlight"></div>
        <div class="absolute top-0 left-0 right-0 z-20 px-4 sm:px-6 pt-4">
          <div class="flex items-center justify-between gap-3">
            <div class="rounded-full bg-black/40 backdrop-blur-md border border-white/10 px-4 py-2 text-xs sm:text-sm">
              <span class="text-white/70">Contestants:</span> <span id="contestantsText" class="font-semibold text-white">6 / 6</span>
            </div>
            <div class="flex items-center gap-2">
              <button id="soundToggle" class="btnHover rounded-full bg-black/40 backdrop-blur-md border border-white/10 px-3 py-2 text-xs sm:text-sm text-white/90">Sound: ON</button>
              <button id="restartBtn" class="btnHover rounded-full bg-black/40 backdrop-blur-md border border-white/10 px-3 py-2 text-xs sm:text-sm text-white/90">Restart</button>
            </div>
          </div>
          <div class="mt-3 h-2 rounded-full bg-white/10 overflow-hidden">
            <div id="progressFill" class="progress-fill h-full w-0 bg-gradient-to-r from-emerald-400 via-lime-300 to-cyan-300"></div>
          </div>
        </div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
          <div id="statusText" class="text-4xl sm:text-6xl font-black tracking-[0.25em] uppercase text-center opacity-0 select-none"></div>
        </div>

        <div class="absolute top-[16%] left-1/2 -translate-x-1/2 z-10">
          <div id="countdown" class="text-6xl sm:text-8xl font-black text-white opacity-0 select-none"></div>
        </div>

        <div class="absolute inset-0 z-10">
          <div id="finishLine" class="absolute top-[11%] left-0 right-0 mx-auto w-[92%] sm:w-[84%] border-t-2 border-dashed border-white/40"></div>
          <div class="absolute top-[11.2%] left-0 right-0 mx-auto w-[92%] sm:w-[84%] flex justify-end">
            <div class="mt-[-12px] rounded-full bg-white/10 backdrop-blur px-3 py-1 text-[11px] tracking-[0.3em] uppercase text-white/70 border border-white/10">Finish</div>
          </div>

          <div class="doll floaty redFacing" id="doll">
            <div class="doll-inner">
              <div class="face-side">
                <div>
                  <div class="head">
                    <div class="hair"></div>
                    <div class="eyes"></div>
                    <div class="mouth"></div>
                  </div>
                  <div class="body"></div>
                  <div class="arm left"></div>
                  <div class="arm right"></div>
                  <div class="leg left"></div>
                  <div class="leg right"></div>
                </div>
              </div>
              <div class="back-side">
                <div>
                  <div class="back-head"></div>
                  <div class="back-body"></div>
                  <div class="arm left"></div>
                  <div class="arm right"></div>
                  <div class="leg left"></div>
                  <div class="leg right"></div>
                </div>
              </div>
            </div>
          </div>

          <div id="trackArea" class="absolute left-0 right-0 bottom-0 h-[78%] sm:h-[72%]"></div>
        </div>

        <div id="playersLayer" class="absolute left-0 right-0 bottom-0 h-[78%] sm:h-[72%] z-20"></div>

        <div class="fixed left-1/2 -translate-x-1/2 bottom-5 z-30 w-[min(92vw,420px)] px-4 pointer-events-auto">
          <button id="goBtn" class="btnHover w-full rounded-2xl bg-gradient-to-r from-emerald-500 to-teal-500 px-7 py-4 font-bold text-white shadow-lg shadow-emerald-500/25 active:scale-[.98]">GO</button>
        </div>
        <div class="fixed left-0 right-0 bottom-0 z-20 pointer-events-none h-[96px] bg-gradient-to-t from-black/45 to-transparent"></div>
        <div class="mt-3 text-center text-xs sm:text-sm text-white/60 fixed left-0 right-0 bottom-[84px] z-30 pointer-events-none">Dev's note: Move only on <span class="text-emerald-300 font-semibold">GREEN LIGHT</span>. If you move on <span class="text-red-300 font-semibold">RED LIGHT</span>, a contestant is eliminated. Use the space bar to move ahead! :)</div>

        <div class="screen-overlay"></div>
      </div>
    </section>

    <section id="result" class="absolute inset-0 hidden items-center justify-center bg-black text-white">
      <div id="resultPanel" class="text-center px-6 max-w-xl">
        <div id="resultTitle" class="text-5xl sm:text-7xl font-black tracking-tight"></div>
        <p id="resultMsg" class="mt-4 text-white/70 text-base sm:text-lg"></p>
        <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
          <button id="playAgainBtn" class="btnHover rounded-2xl bg-white text-black px-6 py-4 font-semibold">Play Again</button>
          <button id="backBtn" class="btnHover rounded-2xl bg-white/10 border border-white/15 px-6 py-4 font-semibold text-white">Back to Invitation</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const landing = document.getElementById('landing');
    const game = document.getElementById('game');
    const result = document.getElementById('result');
    const invitationCard = document.getElementById('invitationCard');
    const playersLayer = document.getElementById('playersLayer');
    const contestantsText = document.getElementById('contestantsText');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const countdownEl = document.getElementById('countdown');
    const doll = document.getElementById('doll');
    const goBtn = document.getElementById('goBtn');
    const soundToggle = document.getElementById('soundToggle');
    const restartBtn = document.getElementById('restartBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const backBtn = document.getElementById('backBtn');
    const resultTitle = document.getElementById('resultTitle');
    const resultMsg = document.getElementById('resultMsg');
    const arenaShake = document.getElementById('arenaShake');
    const resultPanel = document.getElementById('resultPanel');

    let players = [];
    let gameState = 'IDLE';
    let contestants = 6;
    let switchTimer = null;
    let countdownTimer = null;
    let isSoundOn = true;
    let audioCtx = null;
    let musicEl = null;
    let phasePending = null;
    let raf = null;
    let lastTs = 0;
    let moveQueued = false;

    function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function beep(freq=520, dur=0.12, type='sine', gain=0.06){
      if(!isSoundOn) return;
      const ctx = ensureAudio();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g);
      g.connect(ctx.destination);
      const t = ctx.currentTime;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur + 0.03);
    }

    function createMusic(){
      if(musicEl) return;
      musicEl = document.createElement('audio');
      musicEl.src = "test-mpeg";
      musicEl.loop = true;
      musicEl.preload = 'auto';
      musicEl.volume = 0.35;
      musicEl.crossOrigin = 'anonymous';
      musicEl.style.display = 'none';
      document.body.appendChild(musicEl);
    }

    function startMusic(){
      if(!isSoundOn) return;
      createMusic();
      musicEl.volume = gameState === 'RED' ? 0.18 : 0.38;
      musicEl.play().catch(()=>{});
    }
    function stopMusic(){
      if(musicEl){ try{ musicEl.pause(); }catch(e){} }
    }
    function setMusicForState(state){
      if(!musicEl) return;
      musicEl.volume = state === 'RED' ? 0.18 : 0.38;
      if(state === 'RED') musicEl.pause(); else musicEl.play().catch(()=>{});
    }

    function initPlayers(){
      playersLayer.innerHTML = '';
      players = [];
      contestants = 6;
      const lanes = [14, 28, 42, 56, 70, 84];
      lanes.forEach((lane, i) => {
        const el = document.createElement('div');
        el.className = 'player';
        el.style.left = `${10 + i * 5.8}%`;
        el.style.bottom = `${lane}%`;
        el.dataset.index = i;
        el.dataset.pos = '0';
        el.innerHTML = `<div class="head"></div><div class="body"></div><div class="legs"></div>`;
        playersLayer.appendChild(el);
        players.push({el, pos:0, vel:0, dead:false, finished:false, lag:0.75 + Math.random() * 0.45});
      });
      syncUI();
    }
    function syncUI(){
      contestantsText.textContent = `${contestants} / 6`;
      const lead = Math.max(...players.map(p => p.pos));
      progressFill.style.width = `${Math.min(100, lead)}%`;
    }

    function showStatus(text, color){
      statusText.textContent = text;
      statusText.className = `text-4xl sm:text-6xl font-black tracking-[0.25em] uppercase text-center opacity-100 select-none ${color === 'red' ? 'glow-red' : 'glow-green'}`;
      statusText.classList.remove('hidden');
      setTimeout(()=> statusText.classList.add('opacity-0'), 750);
    }

    function setDoll(state){
      doll.classList.remove('redFacing','greenFacing','turn');
      void doll.offsetWidth;
      doll.classList.add('turn');
      setTimeout(()=> doll.classList.add(state === 'RED' ? 'redFacing' : 'greenFacing'), 120);
    }

    function startCountdown(){
      gameState = 'COUNTDOWN';
      let n = 3;
      countdownEl.classList.remove('opacity-0');
      const tick = () => {
        countdownEl.classList.remove('countdownPop');
        void countdownEl.offsetWidth;
        countdownEl.classList.add('countdownPop');
        countdownEl.textContent = n;
        beep(520, 0.08, 'sine', 0.05);
        if(n === 0){
          countdownEl.classList.add('opacity-0');
          clearInterval(countdownTimer);
          startRound();
          return;
        }
        n--;
      };
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    function applyState(next){
      gameState = next;
      showStatus(next === 'GREEN' ? 'GREEN LIGHT' : 'RED LIGHT', next === 'RED' ? 'red' : 'green');
      setDoll(next);
      if(next === 'RED') {
        arenaShake.classList.add('shake');
        setTimeout(()=>arenaShake.classList.remove('shake'), 420);
      }
      if(isSoundOn) {
        if(next === 'RED') { setMusicForState('RED'); beep(120, 0.12, 'square', 0.08); }
        else { startMusic(); beep(620, 0.08, 'sine', 0.05); }
      }
      schedulePhase();
    }

    function schedulePhase(){
      clearTimeout(phasePending);
      const duration = gameState === 'GREEN'
        ? 3500 + Math.random() * 1500
        : 2000 + Math.random() * 1000;

      phasePending = setTimeout(() => {
        applyState(gameState === 'GREEN' ? 'RED' : 'GREEN');
      }, duration);
    }

    function startRound(){
      gameState = 'GREEN';
      showStatus('GREEN LIGHT', 'green');
      setDoll('GREEN');
      startMusic();
      schedulePhase();
      loop();
    }

    function eliminateOne(){
      const target = players.find(p => !p.dead && !p.finished);
      if(!target) return;
      target.dead = true;
      contestants--;
      target.el.classList.add('eliminated');
      target.el.style.pointerEvents = 'none';
      setTimeout(()=> target.el.style.opacity = '.05', 500);
      syncUI();
      if(contestants <= 0) endGame(false);
    }

    function triggerMove(){
      moveQueued = true;
    }

    function updatePlayers(ts){
      const dt = Math.min(0.033, (ts - lastTs) / 1000 || 0.016);
      lastTs = ts;

      if(moveQueued && gameState === 'RED'){
        eliminateOne();
        moveQueued = false;
        syncUI();
        return;
      }

      players.forEach((p, i) => {
        if(p.dead || p.finished) return;

        const shouldMove =
          moveQueued &&
          gameState !== 'IDLE' &&
          gameState !== 'END' &&
          gameState !== 'COUNTDOWN';

        const moving = shouldMove && gameState === 'GREEN';

        const desired = moving ? 26 : 0;

        p.vel += ((desired - p.vel) * 3.2) * dt;

        if(!moving) p.vel *= Math.pow(0.12, dt);

        p.pos += p.vel * dt;

        p.el.style.left = `${10 + i * 5.8 + p.pos * 0.62}%`;

        if(p.vel > 2.2) p.el.classList.add('running');
        else p.el.classList.remove('running');

        if(p.pos >= 92){
          p.finished = true;
          p.el.style.opacity = '0';
        }
      });

      moveQueued = false;
      syncUI();

      if(players.some(p => p.finished)){
        endGame(true);
      }
    }

    function loop(ts=performance.now()){
      if(gameState === 'END' || gameState === 'IDLE') return;
      updatePlayers(ts);
      raf = requestAnimationFrame(loop);
    }

    function endGame(win){
      clearTimeout(switchTimer);
      clearInterval(countdownTimer);
      stopMusic();
      gameState = 'END';
      if(win){
        resultTitle.textContent = 'YOU WIN';
        resultTitle.className = 'text-5xl sm:text-7xl font-black tracking-tight text-emerald-300';
        const perfect = players.filter(p=>p.finished).length === 6;
        resultMsg.textContent = perfect ? 'Perfect win. All 6 contestants reached the finish line.' : 'At least one contestant reached the finish line.';
        burstConfetti();
      } else {
        resultTitle.textContent = 'YOU LOSE';
        resultTitle.className = 'text-5xl sm:text-7xl font-black tracking-tight text-red-300';
        resultMsg.textContent = 'All contestants were eliminated. Try again and time your moves carefully.';
        resultPanel.classList.remove('zoom-out');
        void resultPanel.offsetWidth;
        resultPanel.classList.add('zoom-out');
      }
      setTimeout(() => {
        game.classList.add('hidden');
        result.classList.remove('hidden');
        result.classList.add('fade-in');
      }, 380);
    }

    function burstConfetti(){
      for(let i=0;i<70;i++){
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = `${50 + (Math.random()*20-10)}vw`;
        p.style.top = `${48 + (Math.random()*12-6)}vh`;
        p.style.background = `hsl(${Math.random()*360}, 90%, 60%)`;
        document.body.appendChild(p);
        const dx = (Math.random()*2-1) * 260;
        const dy = (Math.random()*2-1) * -260 - 120;
        const rot = Math.random()*720;
        p.animate([
          {transform:`translate(0,0) rotate(0deg)`, opacity:1},
          {transform:`translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity:0}
        ], {duration: 1400 + Math.random()*700, easing:'cubic-bezier(.2,.8,.2,1)'});
        setTimeout(()=>p.remove(), 2200);
      }
    }

    function startGame(){
      landing.classList.add('fade-out');
      setTimeout(() => {
        landing.classList.add('hidden');
        game.classList.remove('hidden');
        game.classList.add('fade-in');
        initPlayers();
        setTimeout(startCountdown, 300);
      }, 300);
    }

    function resetAll(toLanding=false){
      clearTimeout(switchTimer);
      clearInterval(countdownTimer);
      cancelAnimationFrame(raf);
      stopMusic();
      gameState='IDLE';
      moveQueued=false;
      statusText.classList.add('opacity-0');
      countdownEl.classList.add('opacity-0');
      arenaShake.classList.remove('shake');
      result.classList.add('hidden');
      result.classList.remove('fade-in');
      resultPanel.classList.remove('zoom-out');
      if(toLanding){
        game.classList.add('hidden');
        landing.classList.remove('hidden');
        landing.classList.remove('fade-out');
      } else {
        result.classList.add('hidden');
        game.classList.remove('hidden');
        initPlayers();
        setTimeout(startCountdown, 300);
      }
    }

    invitationCard.addEventListener('click', startGame);
    goBtn.addEventListener('click', () => { if(gameState === 'GREEN') triggerMove(); });
    restartBtn.addEventListener('click', () => resetAll(false));
    playAgainBtn.addEventListener('click', () => { result.classList.add('hidden'); game.classList.remove('hidden'); initPlayers(); setTimeout(startCountdown, 200); });
    backBtn.addEventListener('click', () => { result.classList.add('hidden'); resetAll(true); });
    soundToggle.addEventListener('click', async () => {
      isSoundOn = !isSoundOn;
      soundToggle.textContent = `Sound: ${isSoundOn ? 'ON' : 'OFF'}`;
      if(isSoundOn) { ensureAudio(); if(gameState !== 'IDLE' && gameState !== 'END') startMusic(); }
      else stopMusic();
    });

    window.addEventListener('keydown', (e) => {
      if(e.code === 'Space'){
        e.preventDefault();
        if(game.classList.contains('hidden')) return;
        triggerMove();
      }
    }, {passive:false});

    let touchStart = 0;
    window.addEventListener('touchstart', () => { touchStart = Date.now(); }, {passive:true});
    window.addEventListener('touchend', () => {
      if(Date.now() - touchStart < 500){
        if(!game.classList.contains('hidden')) triggerMove();
      }
    }, {passive:true});

    initPlayers();
  </script>
</body>
</html>
